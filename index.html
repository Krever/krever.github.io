    @media (prefers-color-scheme: dark) {
      :root { --fg: #ededed; --muted: #9a9a9a; --accent: #ededed; --bg: #111111; }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.25rem;
      text-align: center;
    }
    main { max-width: 720px; width: 100%; }
    h1 {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 1.5rem;
      line-height: 1.05;
    }
    .rule {
      border: 0;
      border-top: 1px solid color-mix(in srgb, var(--fg) 18%, transparent);
      width: 100%;
      max-width: 560px;
      margin: 1.5rem auto;
    }
    .subtitle {
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      font-weight: 300;
      color: var(--fg);
      line-height: 1.5;
      margin: 0 auto 2rem;
      max-width: 620px;
    }
    .social {
      display: flex;
      gap: 1.4rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin: 0 0 0.5rem;
    }
    .social a {
      color: var(--fg);
      opacity: 0.75;
      transition: opacity 0.15s ease, transform 0.15s ease;
      display: inline-flex;
    }
    .social a:hover { opacity: 1; transform: translateY(-2px); }
    .social svg { width: 26px; height: 26px; fill: currentColor; }
    nav {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 0.9rem;
      justify-content: center;
      align-items: center;
      font-size: 1.05rem;
    }
    nav a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    nav a:hover { border-bottom-color: var(--fg); }
    nav .sep { color: var(--muted); user-select: none; }
    footer { margin-top: 2.5rem; color: var(--muted); font-size: 0.85rem; }
  </style>
