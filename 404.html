<html lang="en">
<head>

  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#111111">
  <style>
    :root { --fg: #1a1a1a; --muted: #6b6b6b; --bg: #ffffff; }
    @media (prefers-color-scheme: dark) { :root { --fg: #ededed; --muted: #9a9a9a; --bg: #111111; } }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem 1.25rem;
    }
    h1 { font-size: clamp(2.4rem, 6vw, 3.6rem); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 0.75rem; }
    p { color: var(--muted); font-size: 1.15rem; margin: 0 0 1rem; }
    p:last-of-type { margin-bottom: 1.75rem; }
    p a { color: var(--fg); text-decoration: underline; text-underline-offset: 2px; }
    nav { display: flex; gap: 0.9rem; flex-wrap: wrap; justify-content: center; }
    nav a { color: var(--fg); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s ease; }
    nav a:hover { border-bottom-color: var(--fg); }
    nav .sep { color: var(--muted); }
  </style>
</head>
